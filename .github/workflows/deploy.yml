name: Build and Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: deploy-site
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      commit-message: ${{ steps.commit.outputs.message }}
    steps:
      - name: Check out site source
        uses: actions/checkout@v5
        with:
          repository: AWegnerGitHub/awegnergithub.github.io-source
          path: source

      - name: Check out site content
        uses: actions/checkout@v5
        with:
          repository: AWegnerGitHub/awegnergithub.github.io-content
          path: content

      - name: Capture commit message
        id: commit
        run: |
          cd content
          {
            echo 'message<<EOF'
            git log -1 --pretty=%B
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Move content into source tree
        run: rsync -av --progress content source --exclude source

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: |
          cd source
          uv sync --frozen

      - name: Build site with Pelican
        run: |
          cd source
          uv run pelican content --output output --settings publishconf.py --verbose
          rm -rf output/content/images
          rm -rf drafts/

      - name: Minify CSS
        run: |
          cd source
          npx --yes lightningcss-cli --minify -o output/theme/css/site.css output/theme/css/site.css

      - name: Minify HTML
        run: |
          cd source
          npx --yes html-minifier-terser \
            --input-dir output --output-dir output --file-ext html \
            --collapse-whitespace --remove-comments --minify-css true \
            --minify-js true --remove-redundant-attributes --use-short-doctype

      - name: Upload built site
        uses: actions/upload-artifact@v7
        with:
          name: site-output
          path: source/output
          retention-days: 7
          if-no-files-found: error

  deploy:
    name: Deploy to andrewwegner.com
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
      - name: Download built site
        uses: actions/download-artifact@v8
        with:
          name: site-output
          path: output

      - name: Push to public repo
        uses: cpina/github-action-push-to-another-repository@v1.7.3
        env:
          API_TOKEN_GITHUB: ${{ secrets.API_TOKEN_GITHUB }}
        with:
          source-directory: output
          destination-github-username: AWegnerGitHub
          destination-repository-name: awegnergithub.github.io
          user-email: andy@andrewwegner.com
          target-branch: master
          commit-message: ${{ needs.build.outputs.commit-message }}
